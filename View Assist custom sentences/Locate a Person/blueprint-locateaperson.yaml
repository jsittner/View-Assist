# View Assist - Locate a Person (v 1.0.0)
# Written by - jsittner
blueprint:
  name: View Assist - Locate a Person
  description: Ask Assist to locate a person (View Assist locateaperson v 1.0.5)
  domain: automation
  input:
    command_prompt:
      name: Command Text
      description: The phrase you want to use to trigger the automation
      default: "(locate|map) [my] {person}"  
    view:
      name: View
      description: The View Assist dashboard view to use for map display
      default: /dashboard-viewassist/map
    view_info:
      name: Info View
      description: The View Assist dashboard view to use for info display
      default: /dashboard-viewassist/info
    group_entity:
      name: Group Entity
      description: >-
        The group that holds the list of View Assist satellites(example
        group.viewassist_satellites)
      selector:
        entity:
          filter:
            - domain:
                - group
          multiple: false
      default: group.viewassist_satellites
    input_person_names:
      name: Person dictionary
      description: >-
        The phonetic name followed by the home assistant name (example
        '{"john":"jon","simon":"simon"}' )
      default: '{"work":"123 Main Street, Beverly Hills, CA 90210","the white house":"1600 Pennsylvania Avenue NW, Washington, DC 20500"}'
alias: View Assist - Locate a Person
description: "Ask Assist to locate a person"
variables:
  view: !input view
  view_info: !input view_info
  group_entity: !input group_entity
  person_names: "{{ input_person_names | from_json}}"
  target_satellite_device: |-
    {% for sat in expand('group.viewassist_satellites') %}
      {% if (device_id(sat.attributes.mic_device)  == trigger.device_id) or (device_id(sat.attributes.display_device)  == trigger.device_id) %}
        {{ sat.entity_id }}
      {% endif %}
    {% endfor %}
  target_display_device: "{{ device_id(state_attr(target_satellite_device, 'display_device')) }}"
  target_mediaplayer_device: "{{ state_attr(target_satellite_device, 'mediaplayer_device') }}"
  target_satellite_device_type: "{{ state_attr(target_satellite_device, 'type') }}"
  target_display_page_view: "{{ state_attr(target_satellite_device, 'page_view') }}"  
trigger:
  - platform: conversation
    command:
      - !input command_prompt
condition: []
action:
  - if:
      - condition: template
        value_template: >-
          {% if target_satellite_device_type != 'audio_only' %}true{% else
          %}false{% endif %}
    then:
      - data:
          path: "{{ view }}"
        target:
          device_id: "{{ target_display_device }}"
        action: browser_mod.navigate
        enabled: false
      - data:
          value: map
        target:
          entity_id: "{{ target_display_page_view }}"
        action: input_text.set_value
enabled: true
else:
  - action: python_script.set_state
    data:
      entity_id: "{{ target_satellite_device }}"
      title: ""
      message: >-
        <center>{{ trigger.slots.person |capitalize}} isn't a valid
        name.</center>
      message_font_size: 6vw
  - set_conversation_response: "{{ trigger.slots.person }} isn't a valid name"
  - data:
      path: "{{ view_info }}"
    target:
      device_id: "{{ target_display_device }}"
    action: browser_mod.navigate
    enabled: false
  - data:
      value: info
    target:
      entity_id: "{{ target_display_page_view }}"
    action: input_text.set_value
mode: single  
